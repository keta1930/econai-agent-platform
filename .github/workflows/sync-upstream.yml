name: Sync Upstream

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    if: github.repository != 'keta1930/econai-agent-platform'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: |
          git remote add upstream https://github.com/keta1930/econai-agent-platform.git
          git fetch upstream master
          git reset --hard upstream/master
          git push origin master --force
